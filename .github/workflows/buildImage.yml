name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen
        run: docker build -t github-actions-demo:latest .

      - name: Docker Images anzeigen
        run: docker images
